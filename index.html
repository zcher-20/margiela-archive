  <script>
    const heroFront = document.getElementById('hero-img');
    const heroBack = document.getElementById('hero-img-back');
    const hero = heroFront;
    const strip = document.querySelector('.thumbnail-strip');
    const thumbs = document.querySelectorAll('.thumbnail');
    const defaultSrc = heroFront.src;
    const defaultAlt = heroFront.alt;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function sampleBrightness(img) {
      try {
        canvas.width = 64;
        canvas.height = 64;
        ctx.drawImage(img, 0, 0, 64, 64);
        const data = ctx.getImageData(0, 0, 64, 16).data;
        let total = 0;
        for (let i = 0; i < data.length; i += 4) {
          total += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        }
        return total / (data.length / 4);
      } catch (e) {
        return 180;
      }
    }

    function updateUI() {
      const brightness = sampleBrightness(hero);
      document.body.classList.toggle('light-ui', brightness < 140);
    }

    function reveal() {
      document.body.classList.remove('loading');
    }

    hero.addEventListener('load', () => { updateUI(); reveal(); });
    if (hero.complete) { updateUI(); reveal(); }

    function swapHero(src, alt) {
      heroBack.src = heroFront.src;
      heroFront.style.opacity = 0;
      const img = new Image();
      img.src = src;
      img.onload = () => {
        heroFront.src = src;
        heroFront.alt = alt;
        requestAnimationFrame(() => {
          heroFront.style.opacity = 1;
        });
      };
    }

    strip.addEventListener('mouseleave', () => {});

    thumbs.forEach(thumb => {
      thumb.addEventListener('mouseenter', () => {
        swapHero(thumb.dataset.src, thumb.querySelector('img').alt);
      });
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const cursorLabel = document.getElementById('lightbox-cursor');
    const sources = Array.from(thumbs).map(t => t.dataset.src);
    let lightboxIndex = 0;
    let onImage = false;

    thumbs.forEach((thumb, i) => {
      thumb.addEventListener('click', () => {
        lightboxIndex = i;
        openLightbox(sources[lightboxIndex]);
      });
    });

    function openLightbox(src) {
      lightboxImg.style.opacity = 1;
      lightboxImg.src = src;
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      cursorLabel.style.opacity = '0';
    }

    function nextImage() {
      lightboxIndex = (lightboxIndex + 1) % sources.length;
      lightboxImg.style.opacity = 0;
      setTimeout(() => {
        lightboxImg.src = sources[lightboxIndex];
        lightboxImg.style.opacity = 1;
      }, 300);
    }

    lightboxImg.addEventListener('mouseenter', () => { onImage = true; });
    lightboxImg.addEventListener('mouseleave', () => { onImage = false; });

    lightboxImg.addEventListener('click', (e) => {
      e.stopPropagation();
      nextImage();
    });

    lightbox.addEventListener('click', () => {
      closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) {
        closeLightbox();
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (!lightbox.classList.contains('open')) return;
      cursorLabel.style.left = e.clientX + 12 + 'px';
      cursorLabel.style.top = e.clientY + 12 + 'px';
      const isNext = onImage;
      cursorLabel.textContent = isNext ? '[NEXT]' : '[ESC]';
      cursorLabel.style.background = isNext ? '#111' : '#fff';
      cursorLabel.style.color = isNext ? '#f0f0f0' : '#111';
      cursorLabel.style.opacity = '1';
    });
  </script>
