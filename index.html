<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Margiela Archive</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Maison Margiela, <em>Archive</em></h1>
    </div>
    <nav class="header-center">
      <a href="/" class="active">Home</a>
      <a href="/gallery">Gallery</a>
      <a href="/info">Info</a>
    </nav>
    <div class="header-right">
      <a href="mailto:contact@example.com" class="contact-link">Contact &#8599;</a>
    </div>
  </header>

  <main>
    <div class="hero">
      <div class="hero-image">
        <img src="images/hero.jpg" alt="Featured image">
      </div>
    </div>

    <div class="thumbnail-strip">
      <div class="thumbnail"><img src="images/thumb-01.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-02.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-03.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-04.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-05.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-06.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-07.jpg" alt=""></div>
      <div class="thumbnail"><img src="images/thumb-08.jpg" alt=""></div>
    </div>
  </main>

  <footer>
    <div class="footer-left">
      <p>A visual archive of the<br><em>Maison Margiela folders.</em></p>
    </div>
    <div class="footer-right">
      <p>&copy; 2026</p>
    </div>
  </footer>
</body>
</html>
